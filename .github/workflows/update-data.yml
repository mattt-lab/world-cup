name: Update World Cup Data

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 min all day; script exits early outside match windows
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with: { python-version: '3.12' }

      - name: Fetch data
        run: python scripts/fetch_data.py
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

      - name: Commit if changed
        run: |
          git config user.name  "WC Data Bot"
          git config user.email "actions@github.com"
          git add data/matches.json data/standings.json data/summaries/ data/previews/
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: update WC data [skip ci]"
            git push
          fi
