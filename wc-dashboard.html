<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2026 FIFA World Cup</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0b0b;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}

header{border-bottom:1px solid #1e1e1e;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#0b0b0b;z-index:100}
.logo{font-size:14px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.logo em{color:#22c55e;font-style:normal}
.logo-ver{font-size:10px;font-weight:400;color:#333}
nav a{font-size:11px;font-weight:600;color:#444;margin-left:22px;text-transform:uppercase;letter-spacing:.08em;transition:color .15s}
nav a:hover{color:#f0f0f0}
nav a.active{color:#22c55e}

main{max-width:800px;margin:0 auto;padding:24px 16px 60px}
.section-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#444;margin-bottom:10px}

/* Phase banner */
.phase-banner{background:linear-gradient(135deg,#151515,#181818);border:1px solid #222;border-radius:14px;padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.phase-chip{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#22c55e;border:1px solid rgba(34,197,94,.35);border-radius:20px;padding:3px 10px;margin-bottom:8px}
.phase-title{font-size:20px;font-weight:800;letter-spacing:-.01em}
.phase-sub{font-size:12px;color:#666;margin-top:3px}
.live-count{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:#22c55e}

/* Live dot (reused in multiple places) */
.live-dot{display:inline-block;width:8px;height:8px;background:#22c55e;border-radius:50%;flex-shrink:0;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* ── Hero live card ──────────────────────────────────────────────────── */
.hero-card{
    background:linear-gradient(135deg,rgba(34,197,94,.07),rgba(34,197,94,.03));
    border:1px solid rgba(34,197,94,.45);
    border-radius:16px;
    padding:22px 20px 18px;
    margin-bottom:8px;
    box-shadow:0 0 32px rgba(34,197,94,.08);
}
.hero-badge{display:flex;align-items:center;gap:7px;margin-bottom:16px}
.hero-live-pill{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#22c55e;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);border-radius:20px;padding:3px 10px}
.hero-context{font-size:11px;color:#666;letter-spacing:.02em}
.hero-teams{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.hero-team{flex:1;display:flex;align-items:center;gap:11px;min-width:0}
.hero-team.away{justify-content:flex-end;text-align:right}
.hero-crest{flex-shrink:0;width:52px;height:52px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border-radius:10px;overflow:hidden}
.hero-crest img{width:52px;height:52px;object-fit:contain;display:block}
.hero-crest .crest-tla{font-size:11px;font-weight:700;color:#444}
.hero-name{font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.hero-center{flex-shrink:0;text-align:center;min-width:100px}
.hero-score{font-size:44px;font-weight:900;display:flex;align-items:center;justify-content:center;gap:10px;letter-spacing:-.04em;line-height:1}
.hero-score-sep{color:#222;font-weight:300;font-size:36px}
.hero-status{font-size:12px;font-weight:700;color:#22c55e;margin-top:5px;letter-spacing:.04em}
.hero-status.ht{color:#f59e0b}
.hero-blurb{font-size:12px;color:#888;line-height:1.65;padding-top:16px;border-top:1px solid rgba(34,197,94,.12);margin-top:16px;font-style:italic}

/* ── Regular match cards ─────────────────────────────────────────────── */
.match-card{background:#151515;border:1px solid #1e1e1e;border-radius:12px;padding:14px 16px;margin-bottom:4px;display:flex;align-items:center;gap:10px;transition:border-color .15s}
.match-card:hover{border-color:#2a2a2a}
.match-card.finished-card{opacity:.9}
.match-team{flex:1;display:flex;align-items:center;gap:9px;min-width:0}
.match-team.away{justify-content:flex-end;text-align:right}
.crest-wrap{flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#1e1e1e;border-radius:6px;overflow:hidden}
.crest-wrap img{display:block;object-fit:contain}
.crest-tla{font-size:8px;font-weight:700;color:#444;letter-spacing:.04em}
.team-name-txt{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-name-txt.winner{color:#f0f0f0;font-weight:700}
.team-name-txt.loser{color:#444}
.team-tbd{font-size:12px;color:#444;font-style:italic}
.match-center{flex-shrink:0;text-align:center;min-width:90px}
.score-nums{font-size:24px;font-weight:900;display:flex;align-items:center;justify-content:center;gap:8px;line-height:1;letter-spacing:-.02em}
.score-sep{color:#333;font-weight:300;font-size:20px}
.score-vs{font-size:13px;color:#333;font-weight:400}
.match-status{font-size:11px;font-weight:600;margin-top:4px}
.st-ft{color:#444}
.st-soon{color:#f0f0f0}
.match-meta{font-size:10px;color:#555;margin-top:2px;letter-spacing:.02em}
.match-blurb{font-size:11px;color:#666;line-height:1.55;padding:5px 6px 12px;font-style:italic}

.day-header{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.08em;padding:5px 0 8px;margin-top:20px;border-bottom:1px solid #1a1a1a;margin-bottom:10px}
.day-header:first-child{margin-top:0}

/* Skel */
.skel{background:linear-gradient(90deg,#181818 25%,#222 50%,#181818 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.error-msg{background:#151515;border:1px solid #1e1e1e;border-radius:10px;padding:24px;text-align:center;color:#444;font-size:13px}
.refresh-note{font-size:10px;color:#2a2a2a;text-align:right;margin-top:14px}
</style>
</head>
<body>
<header>
    <div class="logo">⚽ World Cup <em>2026</em> <span class="logo-ver">v0.6</span></div>

<main>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const STAGE_LABEL = {
    GROUP_STAGE:'Group Stage', LAST_32:'Round of 32', LAST_16:'Round of 16',
    QUARTER_FINALS:'Quarterfinals', SEMI_FINALS:'Semifinals',
    THIRD_PLACE:'3rd Place Playoff', FINAL:'Final',
};
const STAGE_ORDER = ['GROUP_STAGE','LAST_32','LAST_16','QUARTER_FINALS','SEMI_FINALS','THIRD_PLACE','FINAL'];
const LIVE_ST  = new Set(['LIVE','IN_PLAY','PAUSED']);
const DONE_ST  = new Set(['FINISHED','AWARDED']);
const SCHED_ST = new Set(['TIMED','SCHEDULED']);

// ── Player spotlights (one sentence per team, used in live blurbs) ────────────
const SPOTLIGHT = {

    'Bosnia-Herzegovina':'Ermedin Demirović leads a physical Bosnia attack that will test any defence with his strength and direct running.',

    'Colombia':         'James Rodríguez and Luis Díaz give Colombia two completely different but equally dangerous attacking outlets.',

    'Costa Rica':       'Keylor Navas in goal remains one of the best shot-stoppers in world football, even at this stage of his career.',
    'Croatia':          'Luka Modrić still pulls every string for Croatia — his vision, touch, and ability to control tempo are unrivalled.',

    'France':           'Kylian Mbappé at full speed is the most frightening sight in international football — France\'s attack runs through him.',

    'Ghana':            'Mohammed Kudus has been outstanding in Europe this season; if Ghana are to cause an upset, he\'ll be the one to ignite it.',
    'Greece':           'Vangelis Pavlidis leads the Greek attack with power and movement — a constant aerial threat from set pieces.',
    'Haiti':            'Duckens Nazon gives Haiti a physical, direct outlet and can hold the ball up to bring teammates into play.',
    'Honduras':         'Alberth Elis brings pace and directness on the flanks; Honduras are dangerous when they can play on the break.',
    'Hungary':          'Dominik Szoboszlai drives Hungary\'s attack from midfield with energy, vision, and a powerful long-range shot.',
    'Indonesia':        'Indonesia will be energetic and organised; they\'ll look to hit on the counter with pace from wide areas.',
    'Iran':             'Sardar Azmoun is a natural target man who brings teammates into play and leads Iran\'s line with intelligence.',
    'Iraq':             'Aymen Hussein is Iraq\'s most reliable scorer — composed in front of goal and a real danger from set plays.',
    'Italy':            'Federico Chiesa\'s electric pace and dribbling make him Italy\'s most unpredictable and exciting attacking threat.',
    "Ivory Coast":      'Sébastien Haller\'s strength, movement, and clinical finishing make him one of Africa\'s most dangerous strikers.',
    'Jamaica':          'Michail Antonio brings raw pace and physicality to Jamaica\'s attack; his ability to hold up play is crucial.',
    'Japan':            'Takumi Minamino and Kaoru Mitoma give Japan a relentless pressing duo — their work rate off the ball is as important as their quality on it.',

    'Kenya':            'Michael Olunga is Kenya\'s most reliable scorer with vast international experience at the highest level.',
    'Korea Republic':   'Son Heung-min\'s explosive pace, finishing, and left foot make him a danger every single time he gets on the ball.',
    'Mali':             'Yves Bissouma controls the tempo from the centre of midfield — his physicality and passing range are key for Mali.',
    'Mexico':           'Santiago Giménez has been in lethal club form; if Mexico are to go deep, he will be central to everything they do.',

    'Nigeria':          'Victor Osimhen is the most feared striker in Africa — his explosive movement and finishing can embarrass any defence.',
    'Norway':           'Erling Haaland\'s goal-scoring record is simply historic; Norway\'s best chance of success runs entirely through him.',
    'Panama':           'Ismael Díaz provides Panama\'s best creative outlet — a tricky, pacy winger who can create from nothing.',
    'Paraguay':         'Miguel Almirón\'s relentless running, pressing, and ability to find space between the lines make him a nightmare for defenders.',
    'Peru':             'André Carrillo\'s experience and wide play are essential for Peru — a tireless winger who sets the tone with his work rate.',
    'Poland':           'Robert Lewandowski remains world-class — his movement, heading, and clinical left foot make him lethal inside the box.',
    'Portugal':         'Bruno Fernandes drives Portugal\'s attack with creativity and pressing intensity; watch his late runs into the penalty area.',

    'Saudi Arabia':     'Salem Al-Dawsari shocked Argentina in 2022 with a stunning strike and has only grown in confidence and quality since.',
    'Scotland':         'Andy Robertson\'s relentless energy and delivery from left-back set the tone for Scotland\'s high-pressing game.',
    'Senegal':          'Sadio Mané\'s pace, strength, and eye for goal make him one of Africa\'s greatest ever players — still a huge threat.',
    'Serbia':           'Aleksandar Mitrović is physically imposing and deadly in the air — Serbia\'s best ball into the box will always find him.',
    'Slovakia':         'Milan Škriniar anchors Slovakia\'s defence with composure and reads the game as well as any defender at this level.',
    'Slovenia':         'Benjamin Šeško is a generational talent — a powerful, tall striker with pace and a devastating finish.',
    'South Africa':     'Percy Tau is Bafana Bafana\'s most creative player — quick, technically gifted, and capable of moments of real inspiration.',
    'Spain':            'Lamine Yamal at just 18 is already the most exciting young player in world football; Pedri controls the midfield with elegance.',
    'Sweden':           'Viktor Gyökeres arrives as one of Europe\'s most in-form strikers — his movement, hold-up play, and finishing are elite.',
    'Switzerland':      'Granit Xhaka\'s experience and Xherdan Shaqiri\'s creativity give Switzerland a midfield that punches well above its weight.',
    'Trinidad and Tobago': 'Kevin Molino\'s pace and directness on the wing give Trinidad and Tobago a live wire who can unlock any defence.',
    'Tunisia':          'Youssef Msakni is Tunisia\'s creative heartbeat; their best results come from organised defending and his moments of magic.',
    'Turkey':           'Hakan Çalhanoğlu controls tempo from deep with exceptional passing range — all of Turkey\'s best football flows through him.',
    'Ukraine':          'Mykhailo Mudryk\'s electric pace and dribbling make him one of the most exciting wide players in the tournament.',
    'United States':    'Christian Pulisic is the best American player in a generation — his directness, creativity, and big-game temperament are world-class.',
    'Uruguay':          'Darwin Núñez\'s explosive pace up front combined with Federico Valverde\'s engine from midfield make Uruguay a serious threat.',
    'Uzbekistan':       'Eldor Shomurodov is Uzbekistan\'s talisman — a powerful striker capable of holding up play and finishing against any defence.',
    'Venezuela':        'Yeferson Soteldo\'s low centre of gravity and quick feet make him almost impossible to dispossess in tight spaces.',

function getSpotlight(team) {
    if (!team?.name) return null;
    // Try exact name, then shortName
    return SPOTLIGHT[team.name] || SPOTLIGHT[team.shortName] || null;
}

// ── Cache ─────────────────────────────────────────────────────────────────────
function cacheGet(k){try{const r=JSON.parse(localStorage.getItem(k)||'null');return r&&Date.now()-r.ts<r.ttl?r.data:null}catch{return null}}
function cacheSet(k,d,ttl){try{localStorage.setItem(k,JSON.stringify({data:d,ts:Date.now(),ttl}))}catch{}}
async function loadJson(file,key,ttl=120000){
    const c=cacheGet(key);if(c)return c;
    const r=await fetch(`data/${file}?_=${Date.now()}`);
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();cacheSet(key,d,ttl);return d;
}
const getMatches   = ()=>loadJson('matches.json','wc_matches',120000);
const getStandings = ()=>loadJson('standings.json','wc_standings',120000);

// ── Crest helpers ─────────────────────────────────────────────────────────────
function crest(team, sz=34){
    const url=team?.crest, tla=team?.tla||'?';
    if(!url)return`<div class="crest-wrap" style="width:${sz}px;height:${sz}px"><span class="crest-tla">${tla}</span></div>`;
    return`<div class="crest-wrap" style="width:${sz}px;height:${sz}px"><img src="${url}" width="${sz}" height="${sz}" alt="${tla}" onerror="this.style.display='none'"></div>`;
}
function heroCrest(team){
    const url=team?.crest, tla=team?.tla||'?';
    return`<div class="hero-crest">${url?`<img src="${url}" width="52" height="52" alt="${tla}" onerror="this.style.display='none'">`:`<span class="crest-tla">${tla}</span>`}</div>`;
}

// ── Date helpers ──────────────────────────────────────────────────────────────
function localDay(utc){const d=new Date(utc);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function todayDay(){return localDay(new Date().toISOString())}
function fmtDay(utc){return new Date(utc).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
function fmtTime(utc){return new Date(utc).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}

// ── Match status helpers ──────────────────────────────────────────────────────
function matchSt(m){
    const s=m.score?.fullTime;
    if(DONE_ST.has(m.status))  return{h:s?.home??'-',a:s?.away??'-',label:'FT',cls:'st-ft',live:false};
    if(m.status==='LIVE')      return{h:s?.home??0,  a:s?.away??0,  label:'● LIVE',cls:'st-live',live:true};
    if(m.status==='PAUSED')    return{h:s?.home??0,  a:s?.away??0,  label:'HT',cls:'st-ht',live:true};
    return{h:null,a:null,label:fmtTime(m.utcDate),cls:'st-soon',live:false};
}
function winClass(m,side){
    if(!DONE_ST.has(m.status))return'';
    const w=m.score?.winner;if(!w||w==='DRAW')return'';
    return((side==='home'&&w==='HOME_TEAM')||(side==='away'&&w==='AWAY_TEAM'))?'winner':'loser';
}

// ── Phase detection ───────────────────────────────────────────────────────────
function detectPhase(matches){
    const started=new Set(matches.filter(m=>DONE_ST.has(m.status)||LIVE_ST.has(m.status)).map(m=>m.stage));
    for(const s of [...STAGE_ORDER].reverse())if(started.has(s))return s;
    for(const s of STAGE_ORDER)if(matches.some(m=>m.stage===s))return s;
    return'GROUP_STAGE';
}
function detectMatchday(matches,stage){
    if(stage!=='GROUP_STAGE')return null;
    const played=matches.filter(m=>m.stage==='GROUP_STAGE'&&(DONE_ST.has(m.status)||LIVE_ST.has(m.status))).map(m=>m.matchday);
    return played.length?Math.max(...played):1;
}

// ── Blurb: stakes from standings ──────────────────────────────────────────────
function computeStakes(match, standingsArr){
    if(match.stage!=='GROUP_STAGE')return'';
    if(!match.homeTeam?.name||!match.awayTeam?.name)return'';
    const grpLabel=match.group?.replace('GROUP_','Group ');
    const grp=(standingsArr||[]).find(s=>s.group===grpLabel);
    if(!grp)return'';
    const htRow=grp.table.find(r=>r.team.id===match.homeTeam.id);
    const atRow=grp.table.find(r=>r.team.id===match.awayTeam.id);
    if(!htRow||!atRow)return'';

    const hn=match.homeTeam.shortName||match.homeTeam.name;
    const an=match.awayTeam.shortName||match.awayTeam.name;
    const hp=htRow.points, ap=atRow.points;
    const md=match.matchday||1;
    const grpLetter=(grpLabel||'').replace('Group ','');

    if(DONE_ST.has(match.status)){
        const w=match.score?.winner;
        const winner=w==='HOME_TEAM'?hn:w==='AWAY_TEAM'?an:null;
        return winner?`${winner} took all three points in Group ${grpLetter}.`:`The sides shared the points in Group ${grpLetter}.`;
    }
    if(md===1) return`Opening game in Group ${grpLetter} — both sides looking to get off to a winning start. The mood and momentum from this game can shape the rest of the group.`;
    if(md===2){
        if(hp===3&&ap===3) return`Both ${hn} and ${an} won their openers and come in level on three points. The winner all but leads Group ${grpLetter} into the final matchday.`;
        if(hp===3&&ap===0) return`${hn} arrive in form after a matchday-one win; ${an} are already under pressure after a defeat. A second loss here would put ${an}'s World Cup in serious jeopardy.`;
        if(hp===0&&ap===3) return`${an} are flying after a matchday-one win while ${hn} are in desperate need of a response after their opening defeat. A loss here could end ${hn}'s hopes.`;
        if(hp===1&&ap===1) return`Both sides drew their openers and come into this evenly matched. Whoever takes three points here moves into a very strong position heading into matchday three.`;
        if(hp===3&&ap===1) return`${hn} lead the group after a matchday-one win; ${an} drew their opener and know a defeat today leaves them needing a result on the final matchday.`;
        if(hp===1&&ap===3) return`${an} come in top of the group; ${hn} drew their opener and need a win here to keep qualification in their own hands.`;
        if(hp===0&&ap===0) return`Both teams lost their openers — this is already a must-win situation. The loser will almost certainly be heading home after the group stage.`;
        if(hp===0&&ap===1) return`${hn} are in deep trouble after losing on matchday one. Only a win will do for ${hn}; ${an} just need to avoid defeat to stay comfortable.`;
        if(hp===1&&ap===0) return`${an} are in deep trouble after losing on matchday one. Only a win will do for ${an}; ${hn} just need to avoid defeat to stay comfortable.`;
    }
    if(md===3){
        if(hp>=6) return`${hn} are already through to the knockout stage. They may rotate the squad here — ${an} will look to take advantage of any drop in intensity.`;
        if(ap>=6) return`${an} are already through to the knockout stage. They may rotate the squad here — ${hn} will look to take advantage of any drop in intensity.`;
        if(hp>=4&&ap>=4) return`Both sides can advance with a draw in this final group game. Expect a tense, tactical battle where neither side wants to take risks.`;
        if(hp>=4) return`${hn} need only a point to seal their place in the knockout round. ${an} must attack to have any chance — which could open space for ${hn} on the break.`;
        if(ap>=4) return`${an} need only a point to advance. ${hn} must attack and win, which could open space for ${an} to counter.`;
        if(hp===3&&ap===3) return`Perfectly balanced on the final matchday — both ${hn} and ${an} need a win to feel safe, though a draw and the right result elsewhere could still see both through.`;
        if(hp===0&&ap===0) return`Neither side has a point — both need a win and a swing in goal difference just to have a chance. Expect a wide-open, high-risk contest.`;
        return`Final matchday in Group ${grpLetter}. ${hn} (${hp} pts) and ${an} (${ap} pts) both know exactly what they need to do.`;
    }
    return'';
}

// ── Short blurb (for regular cards) ──────────────────────────────────────────
function computeBlurb(match, standingsArr){
    return computeStakes(match, standingsArr);
}

// ── Long blurb (for live hero cards) ─────────────────────────────────────────
function computeLiveBlurb(match, standingsArr){
    const stakes = computeStakes(match, standingsArr);
    const hs = getSpotlight(match.homeTeam);
    const as_ = getSpotlight(match.awayTeam);
    const parts = [];
    if(stakes) parts.push(stakes);
    if(hs)  parts.push(hs);
    if(as_) parts.push(as_);
    return parts.join(' ');
}

// ── Hero live card ────────────────────────────────────────────────────────────
function liveHeroCard(m, standingsArr){
    const s=m.score?.fullTime;
    const h = m.status==='PAUSED' ? (s?.home??0) : (s?.home??0);
    const a = m.status==='PAUSED' ? (s?.away??0) : (s?.away??0);
    const statusLabel = m.status==='PAUSED' ? 'Half Time' : '● Live';
    const statusCls = m.status==='PAUSED' ? 'ht' : '';
    const grp=m.group?`Group ${m.group.replace('GROUP_','')} · `:'';
    const lbl=STAGE_LABEL[m.stage]||m.stage;
    const md=m.matchday?` · Matchday ${m.matchday}`:'';
    const hn=m.homeTeam?.name?m.homeTeam.shortName||m.homeTeam.name:'TBD';
    const an=m.awayTeam?.name?m.awayTeam.shortName||m.awayTeam.name:'TBD';
    const blurb=computeLiveBlurb(m, standingsArr);

    return`<div class="hero-card">
        <div class="hero-badge">
            <div class="hero-live-pill"><span class="live-dot" style="width:6px;height:6px"></span>Live Now</div>
            <span class="hero-context">${grp}${lbl}${md}</span>
        </div>
        <div class="hero-teams">
            <div class="hero-team">
                ${heroCrest(m.homeTeam)}
                <span class="hero-name">${hn}</span>
            </div>
            <div class="hero-center">
                <div class="hero-score">
                    <span>${h}</span>
                    <span class="hero-score-sep">–</span>
                    <span>${a}</span>
                </div>
                <div class="hero-status ${statusCls}">${statusLabel}</div>
            </div>
            <div class="hero-team away">
                <span class="hero-name">${an}</span>
                ${heroCrest(m.awayTeam)}
            </div>
        </div>
        ${blurb?`<div class="hero-blurb">${blurb}</div>`:''}
    </div>`;
}

// ── Regular match card ────────────────────────────────────────────────────────
function matchCard(m, blurb){
    const{h,a,label,cls}=matchSt(m);
    const ht=m.homeTeam, at=m.awayTeam;
    const htName=ht?.name?`<span class="team-name-txt ${winClass(m,'home')}">${ht.shortName||ht.name}</span>`:`<span class="team-tbd">TBD</span>`;
    const atName=at?.name?`<span class="team-name-txt ${winClass(m,'away')}">${at.shortName||at.name}</span>`:`<span class="team-tbd">TBD</span>`;
    const scoreHtml=h!==null?`<span>${h}</span><span class="score-sep">–</span><span>${a}</span>`:`<span class="score-vs">vs</span>`;
    const grp=m.group?`Grp ${m.group.replace('GROUP_','')} · `:'';
    const lbl=STAGE_LABEL[m.stage]||m.stage;
    const md=m.matchday?` MD${m.matchday}`:'';
    const blurbHtml=blurb?`<div class="match-blurb">${blurb}</div>`:'';
    return`<div class="match-card ${DONE_ST.has(m.status)?'finished-card':''}">
        <div class="match-team">${crest(ht)}${htName}</div>
        <div class="match-center">
            <div class="score-nums">${scoreHtml}</div>
            <div class="match-status ${cls}">${label}</div>
            <div class="match-meta">${grp}${lbl}${md}</div>
        </div>
        <div class="match-team away">${atName}${crest(at)}</div>
    </div>${blurbHtml}`;
}

// ── Render: phase banner ──────────────────────────────────────────────────────
function renderPhase(matches){
    const stage=detectPhase(matches);
    const md=detectMatchday(matches,stage);
    const sub=stage==='GROUP_STAGE'&&md?`Matchday ${md} of 3`:'';
    const liveN=matches.filter(m=>LIVE_ST.has(m.status)).length;
    const liveHtml=liveN?`<div class="live-count"><div class="live-dot"></div>${liveN} LIVE now</div>`:'';
    document.getElementById('phase-section').innerHTML=`
    <div class="phase-banner">
        <div>
            <div class="phase-chip">🏆 2026 FIFA World Cup</div>
            <div class="phase-title">${STAGE_LABEL[stage]||stage}</div>
            ${sub?`<div class="phase-sub">${sub}</div>`:''}
        </div>
        <div>${liveHtml}</div>
    </div>`;
}

// ── Render: matches ───────────────────────────────────────────────────────────
function groupByDay(ms){
    const map=new Map();
    for(const m of ms){const d=localDay(m.utcDate);if(!map.has(d))map.set(d,[]);map.get(d).push(m);}
    return[...map.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
}

function renderMatches(matches, standingsArr){
    const today=todayDay();
    const live=matches.filter(m=>LIVE_ST.has(m.status));
    const todayMs=matches.filter(m=>localDay(m.utcDate)===today);

    // Live section — hero cards
    if(live.length){
        document.getElementById('live-section').innerHTML=
            `<div class="section-label" style="color:#22c55e;margin-bottom:12px">Live Now</div>`+
            live.map(m=>liveHeroCard(m, standingsArr)).join('')+
            `<div style="height:24px"></div>`;
    } else {
        document.getElementById('live-section').innerHTML='';
    }

    const el=document.getElementById('today-section');
    const nonLive=todayMs.filter(m=>!LIVE_ST.has(m.status));

    if(todayMs.length){
        el.innerHTML=`<div class="section-label">Today's Matches</div>
            <div class="day-header">${fmtDay(todayMs[0].utcDate)}</div>`+
            nonLive.map(m=>matchCard(m, computeBlurb(m, standingsArr))).join('');
        return;
    }

    // No matches today — recent + upcoming
    const recent=matches.filter(m=>DONE_ST.has(m.status)).sort((a,b)=>new Date(b.utcDate)-new Date(a.utcDate));
    const upcoming=matches.filter(m=>SCHED_ST.has(m.status)).sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));
    let html='';
    if(recent.length){
        html+=`<div class="section-label">Recent Results</div>`;
        for(const[,ms] of groupByDay(recent.slice(0,12)).slice(0,2)){
            html+=`<div class="day-header">${fmtDay(ms[0].utcDate)}</div>`+ms.map(m=>matchCard(m, computeBlurb(m, standingsArr))).join('');
        }
    }
    if(upcoming.length){
        html+=`<div class="section-label" style="margin-top:${recent.length?'28px':'0'}">Coming Up</div>`;
        for(const[,ms] of groupByDay(upcoming.slice(0,12)).slice(0,2)){
            html+=`<div class="day-header">${fmtDay(ms[0].utcDate)}</div>`+ms.map(m=>matchCard(m, computeBlurb(m, standingsArr))).join('');
        }
    }
    el.innerHTML=html||'<div class="error-msg">No matches found.</div>';
}

// ── Auto-refresh ──────────────────────────────────────────────────────────────
let _timer=null;
function scheduleRefresh(matches){
    clearInterval(_timer);
    if(matches.some(m=>LIVE_ST.has(m.status))){
        _timer=setInterval(async()=>{
            cacheSet('wc_matches',null,0);
            try{await init();}catch{}
        },60000);
    }
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init(){
    try{
        const[md,sd]=await Promise.all([getMatches(),getStandings()]);
        const matches=md.matches||[];
        const standingsArr=(sd.standings||[]).filter(s=>s.type==='TOTAL');
        renderPhase(matches);
        renderMatches(matches, standingsArr);
        scheduleRefresh(matches);
        const upd=md._meta?.updated||sd._meta?.updated;
        document.getElementById('refresh-note').textContent=upd
            ?`Data updated ${new Date(upd).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`
            :`Updated ${new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
    }catch(e){
        const msg=e.message?.includes('404')?'Data not yet available — workflow may still be running.':
                  `Error loading data: ${e.message}`;
        ['phase-section','today-section'].forEach(id=>{
            document.getElementById(id).innerHTML=`<div class="error-msg">${msg}</div>`;
        });
    }
}
init();
</script>
