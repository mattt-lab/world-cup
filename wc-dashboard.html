<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0b0b;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}

header{border-bottom:1px solid #1e1e1e;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#0b0b0b;z-index:100}
.logo{font-size:14px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.logo em{color:#22c55e;font-style:normal}
.logo-ver{font-size:10px;font-weight:400;color:#333}
nav a{font-size:11px;font-weight:600;color:#444;margin-left:22px;text-transform:uppercase;letter-spacing:.08em;transition:color .15s}
nav a:hover{color:#f0f0f0}
nav a.active{color:#22c55e}

main{max-width:800px;margin:0 auto;padding:24px 16px 60px}
.section-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#444;margin-bottom:10px}

/* Phase banner */
.phase-banner{background:linear-gradient(135deg,#151515,#181818);border:1px solid #222;border-radius:14px;padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.phase-chip{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#22c55e;border:1px solid rgba(34,197,94,.35);border-radius:20px;padding:3px 10px;margin-bottom:8px}
.phase-title{font-size:20px;font-weight:800;letter-spacing:-.01em}
.phase-sub{font-size:12px;color:#666;margin-top:3px}
.live-count{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:#22c55e}
.live-dot{display:inline-block;width:8px;height:8px;background:#22c55e;border-radius:50%;flex-shrink:0;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* ── Hero live card ──────────────────────────────────────────────────────────── */
.hero-card{background:linear-gradient(135deg,rgba(34,197,94,.07),rgba(34,197,94,.03));border:1px solid rgba(34,197,94,.45);border-radius:16px;padding:22px 20px 18px;margin-bottom:8px;box-shadow:0 0 32px rgba(34,197,94,.08)}
.hero-badge{display:flex;align-items:center;gap:7px;margin-bottom:16px}
.hero-live-pill{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#22c55e;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);border-radius:20px;padding:3px 10px}
.hero-context{font-size:11px;color:#666;letter-spacing:.02em}
.hero-teams{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.hero-team{flex:1;display:flex;align-items:center;gap:11px;min-width:0}
.hero-team.away{justify-content:flex-end;text-align:right}
.hero-crest{flex-shrink:0;width:52px;height:52px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border-radius:10px;overflow:hidden}
.hero-crest img{width:52px;height:52px;object-fit:contain;display:block}
.hero-crest .crest-tla{font-size:11px;font-weight:700;color:#444}
.hero-name{font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.hero-center{flex-shrink:0;text-align:center;min-width:100px}
.hero-score{font-size:44px;font-weight:900;display:flex;align-items:center;justify-content:center;gap:10px;letter-spacing:-.04em;line-height:1}
.hero-score-sep{color:#222;font-weight:300;font-size:36px}
.hero-status{font-size:12px;font-weight:700;color:#22c55e;margin-top:5px;letter-spacing:.04em}
.hero-status.ht{color:#f59e0b}
.hero-blurb{font-size:12px;color:#888;line-height:1.65;padding-top:16px;border-top:1px solid rgba(34,197,94,.12);margin-top:16px;font-style:italic}

/* Wrapped in an <a> — kill link styles */

function getSpotlight(team){
    if(!team?.name)return null;
    return SPOTLIGHT[team.name]||SPOTLIGHT[team.shortName]||null;

// ── Cache ─────────────────────────────────────────────────────────────────────
function cacheGet(k){try{const r=JSON.parse(localStorage.getItem(k)||'null');return r&&Date.now()-r.ts<r.ttl?r.data:null}catch{return null}}
function cacheSet(k,d,ttl){try{localStorage.setItem(k,JSON.stringify({data:d,ts:Date.now(),ttl}))}catch{}}
async function loadJson(file,key,ttl=120000){
    const c=cacheGet(key);if(c)return c;
    const r=await fetch(`data/${file}?_=${Date.now()}`);
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();cacheSet(key,d,ttl);return d;
}

// ── ESPN live scores (browser fetches directly — updates every 30s) ───────────
const ESPN_URL='https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';
async function fetchESPN(){
    try{
        const r=await fetch(ESPN_URL);
        if(!r.ok)return null;
        return parseESPN(await r.json());
    }catch{return null;}
}
function parseESPN(data){
    const out={};
    for(const event of data?.events||[]){
        const competitors=event.competitions?.[0]?.competitors||[];
        const home=competitors.find(c=>c.homeAway==='home');
        const away=competitors.find(c=>c.homeAway==='away');
        if(!home||!away)continue;
        const homeTla=home.team?.abbreviation;
        const awayTla=away.team?.abbreviation;
        if(!homeTla||!awayTla)continue;
        const status=event.status||{};
        const stType=status.type||{};
        out[`${homeTla}:${awayTla}`]={
            homeScore:parseInt(home.score||0),
            awayScore:parseInt(away.score||0),
            state:stType.state||'',
            clock:status.displayClock||'',
            period:status.period||1,
            detail:stType.shortDetail||'',
        };
    }
    return out;
}

// ── Date / status helpers ─────────────────────────────────────────────────────
function localDay(utc){const d=new Date(utc);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function todayDay(){return localDay(new Date().toISOString())}
function fmtDay(utc){return new Date(utc).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
function fmtTime(utc){return new Date(utc).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}

// Correct for API lag: if a LIVE match started >130 min ago, treat as FINISHED
function effectiveStatus(m){
    if(m.status==='LIVE'||m.status==='IN_PLAY'){
        const elapsedMin=(Date.now()-new Date(m.utcDate))/60000;
        if(elapsedMin>130)return'FINISHED';
    }
    return m.status;
}
function isLive(m){ const s=effectiveStatus(m); return s==='LIVE'||s==='IN_PLAY'||s==='PAUSED'; }
function isDone(m){ return DONE_ST.has(effectiveStatus(m)); }

function matchSt(m){
    const s=m.score?.fullTime;
    const eff=effectiveStatus(m);
    if(DONE_ST.has(eff))    return{h:s?.home??'-',a:s?.away??'-',label:'FT',cls:'st-ft'};
    if(eff==='LIVE')        return{h:s?.home??0, a:s?.away??0, label:'● LIVE',cls:'st-live'};
    if(eff==='PAUSED')      return{h:s?.home??0, a:s?.away??0, label:'HT',cls:'st-ht'};
    return{h:null,a:null,label:fmtTime(m.utcDate),cls:'st-soon'};
}
function winClass(m,side){
    if(!isDone(m))return'';
    const w=m.score?.winner;if(!w||w==='DRAW')return'';
    return((side==='home'&&w==='HOME_TEAM')||(side==='away'&&w==='AWAY_TEAM'))?'winner':'loser';
}

function fmtRefreshed(updatedStr){
    if(!updatedStr)return'';
    const ageMin=Math.floor((Date.now()-new Date(updatedStr))/60000);
    if(ageMin<1)return'refreshed just now';
    if(ageMin===1)return'refreshed 1 min ago';
    return`refreshed ${ageMin} mins ago`;
}

// ── Phase detection ───────────────────────────────────────────────────────────
function detectPhase(matches){
    const started=new Set(matches.filter(m=>isDone(m)||isLive(m)).map(m=>m.stage));
    for(const s of [...STAGE_ORDER].reverse())if(started.has(s))return s;
    for(const s of STAGE_ORDER)if(matches.some(m=>m.stage===s))return s;
    return'GROUP_STAGE';
}
function detectMatchday(matches,stage){
    if(stage!=='GROUP_STAGE')return null;
    const played=matches.filter(m=>m.stage==='GROUP_STAGE'&&(isDone(m)||isLive(m))).map(m=>m.matchday);
    return played.length?Math.max(...played):1;
}

// ── Stakes blurb (always 2 sentences) ────────────────────────────────────────
function computeStakes(match, standingsArr){
    if(match.stage!=='GROUP_STAGE')return'';
    if(!match.homeTeam?.name||!match.awayTeam?.name)return'';
    const grpLabel=match.group?.replace('GROUP_','Group ');
    const grp=(standingsArr||[]).find(s=>s.group===grpLabel);
    if(!grp)return'';
    const htRow=grp.table.find(r=>r.team.id===match.homeTeam.id);
    const atRow=grp.table.find(r=>r.team.id===match.awayTeam.id);
    if(!htRow||!atRow)return'';

    const hn=match.homeTeam.shortName||match.homeTeam.name;
    const an=match.awayTeam.shortName||match.awayTeam.name;
    const hp=htRow.points, ap=atRow.points;
    const md=match.matchday||1;
    const grpLetter=(grpLabel||'').replace('Group ','');

    if(isDone(match)){
        const w=match.score?.winner;
        const winner=w==='HOME_TEAM'?hn:w==='AWAY_TEAM'?an:null;
        const s1=winner?`${winner} took all three points in Group ${grpLetter}.`:`The sides shared the points in a draw in Group ${grpLetter}.`;
        const s2=winner
            ?`${winner==='home'?an:hn} will need to regroup ahead of their final group game.`
            :`Both teams remain level and will head into the final matchday with everything still to play for.`;
        return`${s1} ${s2}`;
    }
    if(md===1) return`Opening game in Group ${grpLetter} — both sides looking to get off to a winning start. The mood and momentum from this game will shape how both teams approach the rest of the group stage.`;
    if(md===2){
        if(hp===3&&ap===3) return`Both ${hn} and ${an} won their openers and come in level on three points. The winner takes control of Group ${grpLetter} heading into the final matchday.`;
        if(hp===3&&ap===0) return`${hn} arrive in form after a matchday-one win; ${an} are under real pressure after a defeat. A second loss here would put ${an}'s World Cup in serious jeopardy.`;
        if(hp===0&&ap===3) return`${an} are flying after a matchday-one win while ${hn} need a response after their opening defeat. A loss here could effectively end ${hn}'s hopes.`;
        if(hp===1&&ap===1) return`Both sides drew their openers and come into this evenly matched. Whoever takes three points tonight moves into a very strong position heading into the final matchday.`;
        if(hp===3&&ap===1) return`${hn} lead the group after a matchday-one win; ${an} drew their opener and know a defeat today leaves them needing a result on the final matchday. Three points could see ${an} still advance as one of the best third-place teams.`;
        if(hp===1&&ap===3) return`${an} come in top of the group; ${hn} drew their opener and need a win here to keep qualification in their own hands. A loss would leave ${hn} relying on other results.`;
        if(hp===0&&ap===0) return`Both teams lost their openers — this is already a must-win situation for both sides. The loser here is all but eliminated from the tournament.`;
        if(hp===0&&ap===1) return`${hn} are in deep trouble after losing on matchday one — only a win will do. ${an} know even a draw keeps them in a healthy position heading into the final game.`;
        if(hp===1&&ap===0) return`${an} are in deep trouble after losing on matchday one — only a win will do. ${hn} know even a draw keeps them in a healthy position heading into the final game.`;
    }
    if(md===3){
        if(hp>=6) return`${hn} are already through to the knockout stage. They may rotate the squad — ${an} will look to take advantage of any drop in intensity.`;
        if(ap>=6) return`${an} are already through to the knockout stage. They may rotate the squad — ${hn} will look to take advantage of any drop in intensity.`;
        if(hp>=4&&ap>=4) return`Both sides can advance with a draw in this final group game. Expect a tense, tactical battle where neither side wants to take risks.`;
        if(hp>=4) return`${hn} need only a point to seal their place in the knockout round. ${an} must attack and win, which could open space for ${hn} to exploit on the counter.`;
        if(ap>=4) return`${an} need only a point to advance. ${hn} must attack and win — which could open space for ${an} to hit them on the break.`;
        if(hp===3&&ap===3) return`Perfectly balanced on the final matchday — both sides need a win to feel safe, though a draw and the right result elsewhere could still see both through. Neither team will want to sit back.`;
        if(hp===0&&ap===0) return`Neither side has a point — both need a win and a swing in goal difference to have any chance of advancing. Expect a wide-open, high-risk contest.`;
        return`Final matchday in Group ${grpLetter}. ${hn} (${hp} pts) and ${an} (${ap} pts) both know exactly what they need to advance.`;
    }
    return'';
}

// Long blurb for live hero: stakes + both player spotlights
function computeLiveBlurb(match, standingsArr){
    const parts=[];
    const stakes=computeStakes(match,standingsArr);
    if(stakes)parts.push(stakes);
    const hs=getSpotlight(match.homeTeam);
    const as_=getSpotlight(match.awayTeam);
    if(hs)parts.push(hs);
    if(as_)parts.push(as_);
    return parts.join(' ');
}

// ── Hero live card ────────────────────────────────────────────────────────────
function liveHeroCard(m, standingsArr, liveScores, liveUpdated){
    // Prefer ESPN live score; fall back to football-data.org score
    const key=`${m.homeTeam?.tla}:${m.awayTeam?.tla}`;
    const espn=liveScores?.[key];
    const fdScore=m.score?.fullTime;
    const h=espn?.homeScore??fdScore?.home??0;
    const a=espn?.awayScore??fdScore?.away??0;

    // Clock / status label — ESPN gives displayClock e.g. "67:23" or "45+2:00"
    const isHT=m.status==='PAUSED'||espn?.detail?.toLowerCase().includes('half time');
    let statusLabel='● Live';
    if(isHT){
        statusLabel='Half Time';
    } else if(espn?.state==='in'&&espn?.clock&&espn.clock!=="0'"){
        // ESPN clock is already formatted e.g. "20'", "45+2'" — use directly
        const half=espn.period===2?'2nd Half':'1st Half';
        statusLabel=`● ${espn.clock} · ${half}`;
    }
    const statusCls=isHT?'ht':'';

    const grp=m.group?`Group ${m.group.replace('GROUP_','')} · `:'';
    const lbl=STAGE_LABEL[m.stage]||m.stage;
    const md=m.matchday?` · Matchday ${m.matchday}`:'';
    const city=VENUE[m.id]?` · ${VENUE[m.id]}`:'';
    const hn=m.homeTeam?.name?m.homeTeam.shortName||m.homeTeam.name:'TBD';
    const an=m.awayTeam?.name?m.awayTeam.shortName||m.awayTeam.name:'TBD';
    const blurb=computeLiveBlurb(m,standingsArr);
    return`<div class="hero-card">
        <div class="hero-badge">
            <div class="hero-live-pill"><span class="live-dot" style="width:6px;height:6px"></span>Live Now</div>
            <span class="hero-context">${grp}${lbl}${md}${city}</span>
        </div>
        <div class="hero-teams">
            <div class="hero-team">${heroCrest(m.homeTeam)}<span class="hero-name">${hn}</span></div>
            <div class="hero-center">
                <div class="hero-score"><span>${h}</span><span class="hero-score-sep">–</span><span>${a}</span></div>
                <div class="hero-status ${statusCls}">${statusLabel}</div>
            </div>
            <div class="hero-team away"><span class="hero-name">${an}</span>${heroCrest(m.awayTeam)}</div>
        </div>
        ${blurb?`<div class="hero-blurb">${blurb}</div>`:''}
        <div class="hero-refresh">${fmtRefreshed(liveUpdated)}</div>
    </div>`;
}

// ── Regular match card (blurb inside, links to group standings) ───────────────
function matchCard(m, blurb, isNext=false){
    const{h,a,label,cls}=matchSt(m);
    const ht=m.homeTeam,at=m.awayTeam;
    const htName=ht?.name?`<span class="team-name-txt ${winClass(m,'home')}">${ht.shortName||ht.name}</span>`:`<span class="team-tbd">TBD</span>`;
    const atName=at?.name?`<span class="team-name-txt ${winClass(m,'away')}">${at.shortName||at.name}</span>`:`<span class="team-tbd">TBD</span>`;
    const scoreHtml=h!==null?`<span>${h}</span><span class="score-sep">–</span><span>${a}</span>`:`<span class="score-vs">vs</span>`;
    const grp=m.group?`Grp ${m.group.replace('GROUP_','')} · `:'';
    const lbl=STAGE_LABEL[m.stage]||m.stage;
    const md=m.matchday?` MD${m.matchday}`:'';
    const city=VENUE[m.id]?` · ${VENUE[m.id]}`:'';
    const blurbHtml=blurb?`<div class="match-blurb">${blurb}</div>`:'';
    const grpAnchor=m.group?`#group-${m.group.replace('GROUP_','').toLowerCase()}`:'';
    const cardCls=[isDone(m)?'finished-card':'',isNext?'next-up-card':''].filter(Boolean).join(' ');
    const upNextBadge=isNext?`<div class="up-next-badge">▶ Up next</div>`:'';
    return`<a class="match-link" href="wc-groups.html${grpAnchor}">
        <div class="match-card ${cardCls}">
            ${upNextBadge}
            <div class="match-row">
                <div class="match-team">${crest(ht)}${htName}</div>
                <div class="match-center">
                    <div class="score-nums">${scoreHtml}</div>
                    <div class="match-status ${cls}">${label}</div>
                    <div class="match-meta">${grp}${lbl}${md}${city}</div>
                </div>
                <div class="match-team away">${atName}${crest(at)}</div>
            </div>
            ${blurbHtml}
        </div>
    </a>`;
}

// ── Render: phase banner ──────────────────────────────────────────────────────
function renderPhase(matches){
    const stage=detectPhase(matches);
    const md=detectMatchday(matches,stage);
    const sub=stage==='GROUP_STAGE'&&md?`Matchday ${md} of 3`:'';
    const liveN=matches.filter(m=>isLive(m)).length;
    const liveHtml=liveN?`<div class="live-count"><div class="live-dot"></div>${liveN} LIVE now</div>`:'';
    document.getElementById('phase-section').innerHTML=`
    <div class="phase-banner">
        <div>
            <div class="phase-chip">🏆 2026 FIFA World Cup</div>
            <div class="phase-title">${STAGE_LABEL[stage]||stage}</div>
            ${sub?`<div class="phase-sub">${sub}</div>`:''}
        </div>
        <div>${liveHtml}</div>
    </div>`;
}

// ── Render: matches ───────────────────────────────────────────────────────────
function groupByDay(ms){
    const map=new Map();
    for(const m of ms){const d=localDay(m.utcDate);if(!map.has(d))map.set(d,[]);map.get(d).push(m);}
    return[...map.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
}

function renderMatches(matches,standingsArr,liveScores,liveUpdated){
    const today=todayDay();
    const live=matches.filter(m=>isLive(m));
    const todayMs=matches.filter(m=>localDay(m.utcDate)===today);

    if(live.length){
        document.getElementById('live-section').innerHTML=
            `<div class="section-label" style="color:#22c55e;margin-bottom:12px">Live Now</div>`+
            live.map(m=>liveHeroCard(m,standingsArr,liveScores,liveUpdated)).join('')+
            `<div style="height:24px"></div>`;
    } else {
        document.getElementById('live-section').innerHTML='';
    }

    const el=document.getElementById('today-section');

    if(todayMs.length){
        const upcoming=todayMs.filter(m=>!isLive(m)&&!isDone(m))
            .sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));
        const finished=todayMs.filter(m=>isDone(m))
            .sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));
        let html=`<div class="section-label">${fmtDay(todayMs[0].utcDate)}</div>`;
        if(upcoming.length){
            html+=`<div class="subsec-label green">Coming up</div>`;
            html+=upcoming.map((m,i)=>matchCard(m,computeStakes(m,standingsArr),i===0)).join('');
        }
        if(finished.length){
            html+=`<div class="subsec-label" style="margin-top:${upcoming.length?'18px':'4px'}">Earlier today</div>`;
            html+=finished.map(m=>matchCard(m,computeStakes(m,standingsArr))).join('');
        }
        el.innerHTML=html;
        return;
    }

    const recent=matches.filter(m=>isDone(m)).sort((a,b)=>new Date(b.utcDate)-new Date(a.utcDate));
    const upcoming=matches.filter(m=>SCHED_ST.has(effectiveStatus(m))).sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));
    let html='';
    if(recent.length){
        html+=`<div class="section-label">Recent Results</div>`;
        for(const[,ms] of groupByDay(recent.slice(0,12)).slice(0,2)){
            html+=`<div class="day-header">${fmtDay(ms[0].utcDate)}</div>`+ms.map(m=>matchCard(m,computeStakes(m,standingsArr))).join('');
        }
    }
    if(upcoming.length){
        html+=`<div class="section-label" style="margin-top:${recent.length?'28px':'0'}">Coming Up</div>`;
        for(const[,ms] of groupByDay(upcoming.slice(0,12)).slice(0,2)){
            html+=`<div class="day-header">${fmtDay(ms[0].utcDate)}</div>`+ms.map(m=>matchCard(m,computeStakes(m,standingsArr))).join('');
        }
    }
    el.innerHTML=html||'<div class="error-msg">No matches found.</div>';
}

// ── Auto-refresh ──────────────────────────────────────────────────────────────
let _matchTimer=null, _espnTimer=null;

async function refreshLiveSection(){
    const scores=await fetchESPN();
    if(!scores)return;
    _liveScores=scores;
    _liveUpdated=new Date().toISOString();
    const live=_currentMatches.filter(m=>isLive(m));
    if(!live.length)return;
    document.getElementById('live-section').innerHTML=
        `<div class="section-label" style="color:#22c55e;margin-bottom:12px">Live Now</div>`+
        live.map(m=>liveHeroCard(m,_currentStandings,_liveScores,_liveUpdated)).join('')+
        `<div style="height:24px"></div>`;
}

function scheduleRefresh(matches){
    clearInterval(_matchTimer);
    clearInterval(_espnTimer);
    if(matches.some(m=>isLive(m))){
        // Full data refresh every 60s (matches.json + standings.json)
        _matchTimer=setInterval(async()=>{
            cacheSet('wc_matches',null,0);
            cacheSet('wc_standings',null,0);
            try{await init();}catch{}
        },60000);
        // ESPN score refresh every 30s — browser fetches directly, no GH Actions lag
        _espnTimer=setInterval(refreshLiveSection,30000);
    }
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init(){
    try{
        const[md,sd]=await Promise.all([getMatches(),getStandings()]);
        _currentMatches=md.matches||[];
        _currentStandings=(sd.standings||[]).filter(s=>s.type==='TOTAL');
        // Fetch ESPN directly — fresh score data every init, no GH Actions dependency
        const scores=await fetchESPN();
        if(scores){_liveScores=scores;_liveUpdated=new Date().toISOString();}
        renderPhase(_currentMatches);
        renderMatches(_currentMatches,_currentStandings,_liveScores,_liveUpdated);
        scheduleRefresh(_currentMatches);
        const upd=md._meta?.updated||sd._meta?.updated;
        document.getElementById('refresh-note').textContent=upd
            ?`Data updated ${new Date(upd).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`
            :`Updated ${new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
    }catch(e){
        ['phase-section','today-section'].forEach(id=>{
            document.getElementById(id).innerHTML=`<div class="error-msg">Error: ${e.message}</div>`;
        });
    }
}
init();
</script>
