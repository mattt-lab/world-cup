<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2026 FIFA World Cup</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#f2f2f2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}

/* Header */
header{border-bottom:1px solid #252525;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#0d0d0d;z-index:100}
.logo{font-size:14px;font-weight:800;letter-spacing:.05em;text-transform:uppercase}
.logo em{color:#27AE60;font-style:normal}
nav a{font-size:11px;font-weight:600;color:#555;margin-left:22px;text-transform:uppercase;letter-spacing:.08em;transition:color .15s}
nav a:hover{color:#f2f2f2}
nav a.active{color:#27AE60}

/* Layout */
main{max-width:860px;margin:0 auto;padding:24px 16px 60px}
.section-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#555;margin-bottom:10px}

/* Phase banner */
.phase-banner{background:#161616;border:1px solid #252525;border-radius:12px;padding:18px 22px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.phase-chip{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#27AE60;border:1px solid #27AE60;border-radius:20px;padding:3px 10px;margin-bottom:6px}
.phase-title{font-size:18px;font-weight:700}
.phase-sub{font-size:12px;color:#777;margin-top:3px}
.phase-right{text-align:right;color:#555;font-size:12px;flex-shrink:0}

/* Match cards */
.match-card{background:#161616;border:1px solid #252525;border-radius:10px;padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.match-card.live{border-color:#1d5c2e;background:#111814}
.match-team{flex:1;display:flex;align-items:center;gap:7px;min-width:0}
.match-team.away{flex-direction:row-reverse;text-align:right}
.team-flag{font-size:20px;flex-shrink:0;line-height:1}
.team-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-name.winner{color:#f2f2f2}
.team-name.loser{color:#666}
.match-center{flex-shrink:0;text-align:center;min-width:88px}
.score-nums{font-size:22px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:7px;line-height:1}
.score-sep{color:#444;font-weight:300;font-size:18px}
.match-status{font-size:11px;font-weight:600;margin-top:4px}
.st-ft{color:#555}
.st-live{color:#27AE60}
.st-ht{color:#E8B84B}
.st-soon{color:#f2f2f2}
.match-meta{font-size:10px;color:#444;margin-top:2px}

/* Day header */
.day-header{font-size:11px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.08em;padding:6px 0 8px;margin-top:20px;border-bottom:1px solid #1e1e1e;margin-bottom:10px}
.day-header:first-child{margin-top:0}

/* Group snapshot */
.groups-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:680px){.groups-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.groups-grid{grid-template-columns:repeat(2,1fr)}}
.group-mini{background:#161616;border:1px solid #252525;border-radius:10px;padding:11px 12px}
.group-mini-title{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#444;margin-bottom:7px}
.mini-row{display:flex;align-items:center;gap:5px;padding:2px 0;font-size:12px}
.mini-pos{width:12px;font-size:10px;color:#444;flex-shrink:0}
.mini-flag{font-size:13px;flex-shrink:0}
.mini-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#ccc}
.mini-pts{font-size:11px;font-weight:700;flex-shrink:0}
.mini-bar{width:3px;height:13px;border-radius:2px;flex-shrink:0}
.mini-row.q1 .mini-bar,.mini-row.q2 .mini-bar{background:#27AE60}
.mini-row.q1 .mini-pts,.mini-row.q2 .mini-pts{color:#27AE60}
.mini-row.q3 .mini-bar{background:#E8B84B}
.mini-row.q3 .mini-pts{color:#E8B84B}
.mini-row.q4 .mini-bar{background:#2a2a2a}
.mini-row.q4 .mini-pts{color:#444}

/* Skeleton */
.skel{background:linear-gradient(90deg,#1c1c1c 25%,#262626 50%,#1c1c1c 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.error-msg{background:#161616;border:1px solid #252525;border-radius:10px;padding:28px;text-align:center;color:#555;font-size:13px}
.refresh-note{font-size:10px;color:#444;text-align:right;margin-top:12px}
</style>
</head>
<body>
<header>
    <div class="logo">⚽ World Cup <em>2026</em> <span style="font-size:10px;font-weight:500;color:#444;margin-left:6px">v0.5</span></div>
    <nav>
        <a href="wc-dashboard.html" class="active">Today</a>
        <a href="wc-groups.html">Groups</a>
        <a href="wc-schedule.html">Schedule</a>
    </nav>
</header>

<main>
    <div id="phase-section">
        <div class="phase-banner">
            <div class="phase-left">
                <div class="skel" style="height:16px;width:110px;margin-bottom:8px"></div>
                <div class="skel" style="height:22px;width:180px;margin-bottom:6px"></div>
                <div class="skel" style="height:14px;width:140px"></div>
            </div>
        </div>
    </div>

    <div id="live-section"></div>

    <div id="today-section">
        <div class="section-label">Matches</div>
        <div class="match-card"><div class="skel" style="height:52px;width:100%"></div></div>
        <div class="match-card"><div class="skel" style="height:52px;width:100%"></div></div>
        <div class="match-card"><div class="skel" style="height:52px;width:100%"></div></div>
    </div>

    <div style="margin-top:28px">
        <div class="section-label">Group Standings</div>
        <div id="groups-section" class="groups-grid">
            ${Array(12).fill('<div class="group-mini"><div class="skel" style="height:90px"></div></div>').join('')}
        </div>
    </div>

    <div class="refresh-note" id="refresh-note"></div>
</main>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const API_KEY = 'b200b024810649c195ad69436cdc1a62';
const BASE    = 'https://api.football-data.org/v4';

// ── Rate-limit state (read from response headers per API docs) ───────────────
let _reqAvail = 10;
let _resetMs  = 0;

// ── Flag emoji lookup ────────────────────────────────────────────────────────
const FLAGS = {
    'Argentina':'🇦🇷','Australia':'🇦🇺','Austria':'🇦🇹','Belgium':'🇧🇪',
    'Bolivia':'🇧🇴','Brazil':'🇧🇷','Canada':'🇨🇦','Cameroon':'🇨🇲',
    'Chile':'🇨🇱','Colombia':'🇨🇴','Costa Rica':'🇨🇷','Croatia':'🇭🇷',
    'Cuba':'🇨🇺','Czech Republic':'🇨🇿','Czechia':'🇨🇿','Denmark':'🇩🇰',
    'DR Congo':'🇨🇩',"Congo DR":'🇨🇩','Ecuador':'🇪🇨','Egypt':'🇪🇬',
    'El Salvador':'🇸🇻','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','France':'🇫🇷','Germany':'🇩🇪',
    'Ghana':'🇬🇭','Greece':'🇬🇷','Honduras':'🇭🇳','Hungary':'🇭🇺',
    'Indonesia':'🇮🇩','Iran':'🇮🇷','Iraq':'🇮🇶','Italy':'🇮🇹',
    "Côte d'Ivoire":'🇨🇮','Ivory Coast':'🇨🇮','Jamaica':'🇯🇲','Japan':'🇯🇵',
    'Jordan':'🇯🇴','Kenya':'🇰🇪','Mali':'🇲🇱','Mexico':'🇲🇽',
    'Morocco':'🇲🇦','Netherlands':'🇳🇱','New Zealand':'🇳🇿','Nigeria':'🇳🇬',
    'Norway':'🇳🇴','Panama':'🇵🇦','Paraguay':'🇵🇾','Peru':'🇵🇪',
    'Poland':'🇵🇱','Portugal':'🇵🇹','Qatar':'🇶🇦','Romania':'🇷🇴',
    'Saudi Arabia':'🇸🇦','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Senegal':'🇸🇳','Serbia':'🇷🇸',
    'Slovakia':'🇸🇰','Slovenia':'🇸🇮','South Africa':'🇿🇦',
    'Korea Republic':'🇰🇷','South Korea':'🇰🇷','Spain':'🇪🇸',
    'Sweden':'🇸🇪','Switzerland':'🇨🇭','Trinidad and Tobago':'🇹🇹',
    'Tunisia':'🇹🇳','Turkey':'🇹🇷','Türkiye':'🇹🇷','Ukraine':'🇺🇦',
    'United States':'🇺🇸','USA':'🇺🇸','Uruguay':'🇺🇾','Uzbekistan':'🇺🇿',
    'Venezuela':'🇻🇪','Wales':'🏴󠁧󠁢󠁷󠁬󠁳󠁿',
};
const flag = n => FLAGS[n] || '🏳';

// ── Stage labels ─────────────────────────────────────────────────────────────
const STAGE_LABEL = {
    GROUP_STAGE:'Group Stage', ROUND_OF_32:'Round of 32',
    ROUND_OF_16:'Round of 16', QUARTER_FINALS:'Quarterfinals',
    SEMI_FINALS:'Semifinals',  THIRD_PLACE:'3rd Place',  FINAL:'Final',
};
const STAGE_ORDER = ['GROUP_STAGE','ROUND_OF_32','ROUND_OF_16','QUARTER_FINALS','SEMI_FINALS','THIRD_PLACE','FINAL'];

// ── LocalStorage cache ───────────────────────────────────────────────────────
function cacheGet(k) {
    try {
        const r = JSON.parse(localStorage.getItem(k)||'null');
        if (!r || Date.now() - r.ts > r.ttl) return null;
        return r.data;
    } catch { return null; }
}
function cacheSet(k, data, ttl) {
    try { localStorage.setItem(k, JSON.stringify({data, ts:Date.now(), ttl})); } catch {}
}

// ── API fetch ────────────────────────────────────────────────────────────────
async function apiFetch(path, cacheKey, ttl=180000) {
    const cached = cacheKey ? cacheGet(cacheKey) : null;
    if (cached) return cached;
    // Back off if the API told us we're nearly out of quota
    if (_reqAvail <= 1 && _resetMs > Date.now()) {
        await new Promise(r => setTimeout(r, _resetMs - Date.now() + 200));
    }
    const r = await fetch(`${BASE}${path}`, {headers:{'X-Auth-Token':API_KEY}});
    // Honour throttle headers so we never hit the rate limiter
    const avail = r.headers.get('X-Requests-Available-Minute');
    const reset = r.headers.get('X-RequestCounter-Reset');
    if (avail !== null) _reqAvail = parseInt(avail, 10);
    if (reset !== null) _resetMs  = Date.now() + parseInt(reset, 10) * 1000;
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    if (cacheKey) cacheSet(cacheKey, data, ttl);
    return data;
}
const getMatches   = () => apiFetch('/competitions/WC/matches',   'wc_matches',   180000);
const getStandings = () => apiFetch('/competitions/WC/standings', 'wc_standings', 300000);

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtDateHeader(utcStr) {
    return new Date(utcStr).toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
}
function fmtTime(utcStr) {
    return new Date(utcStr).toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
}
function fmtUpdated(d) {
    return d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
}
function localDateStr(utcStr) {
    const d = new Date(utcStr);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── Match status rendering ────────────────────────────────────────────────────
function matchStatus(m) {
    const s = m.score?.fullTime;
    const isLive = m.status === 'IN_PLAY';
    const isPaused = m.status === 'PAUSED';
    const isDone = m.status === 'FINISHED' || m.status === 'AWARDED';

    if (isDone)   return { home: s.home, away: s.away, label:'FT',       cls:'st-ft',   live:false };
    if (isLive)   return { home: s?.home??0, away: s?.away??0, label:'● LIVE', cls:'st-live', live:true  };
    if (isPaused) return { home: s?.home??0, away: s?.away??0, label:'HT',     cls:'st-ht',   live:true  };
    return { home:null, away:null, label: fmtTime(m.utcDate), cls:'st-soon', live:false };
}

function teamClass(m, side) {
    if (m.status !== 'FINISHED' && m.status !== 'AWARDED') return '';
    const w = m.score?.winner;
    if (!w || w === 'DRAW') return '';
    const won = (side === 'home' && w === 'HOME_TEAM') || (side === 'away' && w === 'AWAY_TEAM');
    return won ? 'winner' : 'loser';
}

function matchCard(m) {
    const { home, away, label, cls, live } = matchStatus(m);
    const scoreHtml = home !== null
        ? `<span>${home}</span><span class="score-sep">–</span><span>${away}</span>`
        : `<span style="color:#555;font-size:16px;font-weight:400">vs</span>`;
    const grp = m.group ? `Grp ${m.group.replace('GROUP_','')}` : (STAGE_LABEL[m.stage]||m.stage);
    const md  = m.matchday ? ` · MD${m.matchday}` : '';
    return `
    <div class="match-card ${live?'live':''}">
        <div class="match-team">
            <span class="team-flag">${flag(m.homeTeam.name)}</span>
            <span class="team-name ${teamClass(m,'home')}">${m.homeTeam.shortName||m.homeTeam.name}</span>
        </div>
        <div class="match-center">
            <div class="score-nums">${scoreHtml}</div>
            <div class="match-status ${cls}">${label}</div>
            <div class="match-meta">${grp}${md}</div>
        </div>
        <div class="match-team away">
            <span class="team-flag">${flag(m.awayTeam.name)}</span>
            <span class="team-name ${teamClass(m,'away')}">${m.awayTeam.shortName||m.awayTeam.name}</span>
        </div>
    </div>`;
}

// ── Phase detection ───────────────────────────────────────────────────────────
function detectPhase(matches) {
    // Most advanced stage with upcoming/live matches
    const active = matches.filter(m => !['FINISHED','AWARDED'].includes(m.status));
    for (const stage of [...STAGE_ORDER].reverse()) {
        if (active.some(m => m.stage === stage)) return stage;
    }
    // All done
    for (const stage of [...STAGE_ORDER].reverse()) {
        if (matches.some(m => m.stage === stage)) return stage;
    }
    return 'GROUP_STAGE';
}

function detectMatchday(matches, stage) {
    if (stage !== 'GROUP_STAGE') return null;
    const active = matches.filter(m => m.stage === 'GROUP_STAGE' && !['FINISHED','AWARDED'].includes(m.status));
    if (active.length) return Math.min(...active.map(m=>m.matchday));
    const done = matches.filter(m => m.stage === 'GROUP_STAGE' && ['FINISHED','AWARDED'].includes(m.status));
    return done.length ? Math.max(...done.map(m=>m.matchday)) : 1;
}

// ── Render: phase banner ──────────────────────────────────────────────────────
function renderPhase(matches) {
    const stage = detectPhase(matches);
    const md = detectMatchday(matches, stage);
    const subtitle = stage === 'GROUP_STAGE' && md ? `Matchday ${md} of 3` : '';
    const liveCount = matches.filter(m=>['IN_PLAY','PAUSED'].includes(m.status)).length;
    const liveHtml = liveCount ? `<span style="color:#27AE60;font-size:12px;font-weight:700">● ${liveCount} LIVE</span>` : '';
    document.getElementById('phase-section').innerHTML = `
    <div class="phase-banner">
        <div class="phase-left">
            <div class="phase-chip">2026 FIFA World Cup</div>
            <div class="phase-title">${STAGE_LABEL[stage]||stage}</div>
            ${subtitle ? `<div class="phase-sub">${subtitle}</div>` : ''}
        </div>
        <div class="phase-right">${liveHtml}</div>
    </div>`;
}

// ── Render: today's matches ───────────────────────────────────────────────────
function renderToday(matches) {
    const today = todayStr();
    const live = matches.filter(m => ['IN_PLAY','PAUSED'].includes(m.status));
    const todayMatches = matches.filter(m => localDateStr(m.utcDate) === today);
    const upcoming = matches.filter(m => ['SCHEDULED','TIMED'].includes(m.status)).sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));
    const recent = matches.filter(m => ['FINISHED','AWARDED'].includes(m.status)).sort((a,b)=>new Date(b.utcDate)-new Date(a.utcDate));

    let liveHtml = '', liveSection = '';
    if (live.length) {
        liveHtml = live.map(matchCard).join('');
        liveSection = `<div class="section-label" style="color:#27AE60;margin-bottom:10px">● Live Now</div>${liveHtml}<div style="height:20px"></div>`;
        document.getElementById('live-section').innerHTML = liveSection;
    } else {
        document.getElementById('live-section').innerHTML = '';
    }

    const el = document.getElementById('today-section');

    if (todayMatches.length) {
        const nonLive = todayMatches.filter(m => !['IN_PLAY','PAUSED'].includes(m.status));
        const html = nonLive.length
            ? `<div class="section-label">Today's Matches</div>
               <div class="day-header">${fmtDateHeader(todayMatches[0].utcDate)}</div>
               ${nonLive.map(matchCard).join('')}`
            : `<div class="section-label">Today's Matches</div>
               <div class="error-msg" style="padding:20px">All of today's matches are live above.</div>`;
        el.innerHTML = html;
        return;
    }

    // No matches today — show recent + upcoming
    let html = '';
    if (recent.length) {
        const byDay = groupByDay(recent.slice(0, 12));
        html += `<div class="section-label">Recent Results</div>`;
        for (const [day, ms] of byDay.slice(0,2)) {
            html += `<div class="day-header">${fmtDateHeader(ms[0].utcDate)}</div>` + ms.map(matchCard).join('');
        }
    }
    if (upcoming.length) {
        const byDay = groupByDay(upcoming.slice(0,12));
        html += `<div class="section-label" style="margin-top:${recent.length?'28px':'0'}">Upcoming</div>`;
        for (const [day, ms] of byDay.slice(0,2)) {
            html += `<div class="day-header">${fmtDateHeader(ms[0].utcDate)}</div>` + ms.map(matchCard).join('');
        }
    }
    el.innerHTML = html || '<div class="error-msg">No matches found.</div>';
}

function groupByDay(matches) {
    const map = new Map();
    for (const m of matches) {
        const d = localDateStr(m.utcDate);
        if (!map.has(d)) map.set(d, []);
        map.get(d).push(m);
    }
    return [...map.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
}

// ── Render: group snapshot ────────────────────────────────────────────────────
function renderGroupSnapshot(standings) {
    const groups = standings.filter(s => s.type === 'TOTAL' && s.stage === 'GROUP_STAGE');
    groups.sort((a,b) => a.group.localeCompare(b.group));

    const html = groups.map(g => {
        const letter = g.group.replace('GROUP_','');
        const rows = g.table.slice(0,4).map((row, i) => {
            const qCls = i===0?'q1': i===1?'q2': i===2?'q3':'q4';
            return `<div class="mini-row ${qCls}">
                <div class="mini-bar"></div>
                <span class="mini-pos">${row.position}</span>
                <span class="mini-flag">${flag(row.team.name)}</span>
                <span class="mini-name">${row.team.tla||row.team.shortName}</span>
                <span class="mini-pts">${row.points}</span>
            </div>`;
        }).join('');
        return `<div class="group-mini">
            <div class="group-mini-title">Group ${letter}</div>
            ${rows}
        </div>`;
    }).join('');

    document.getElementById('groups-section').innerHTML = html || '<div class="error-msg">Standings not yet available.</div>';
}

// ── Auto-refresh live ─────────────────────────────────────────────────────────
let refreshTimer = null;
function scheduleRefresh(matches) {
    clearInterval(refreshTimer);
    const hasLive = matches.some(m => ['IN_PLAY','PAUSED'].includes(m.status));
    if (hasLive) {
        refreshTimer = setInterval(async () => {
            cacheSet('wc_matches', null, 0); // invalidate
            try { await init(); } catch {}
        }, 60000);
    }
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
    try {
        const [matchData, standingsData] = await Promise.all([
            getMatches(), getStandings()
        ]);
        const matches = matchData.matches || [];
        const standings = standingsData.standings || [];

        renderPhase(matches);
        renderToday(matches);
        renderGroupSnapshot(standings);
        scheduleRefresh(matches);

        document.getElementById('refresh-note').textContent = `Updated ${fmtUpdated(new Date())}`;
    } catch(e) {
        const msg = e.message?.includes('401') ? 'Invalid API key — check YOUR_KEY_HERE.' : `Error: ${e.message}`;
        ['phase-section','today-section','groups-section'].forEach(id => {
            document.getElementById(id).innerHTML = `<div class="error-msg">${msg}</div>`;
        });
    }
}

init();
</script>
</body>
</html>
