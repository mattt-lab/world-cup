<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Schedule · 2026 World Cup</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0b0b;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}

header{border-bottom:1px solid #1e1e1e;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#0b0b0b;z-index:100}
.logo{font-size:14px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.logo em{color:#22c55e;font-style:normal}
.logo-ver{font-size:10px;font-weight:400;color:#333}
nav a{font-size:11px;font-weight:600;color:#444;margin-left:22px;text-transform:uppercase;letter-spacing:.08em;transition:color .15s}
nav a:hover{color:#f0f0f0}
nav a.active{color:#22c55e}

main{max-width:800px;margin:0 auto;padding:24px 16px 60px}
.page-title{font-size:22px;font-weight:800;margin-bottom:16px}
.match-count{font-size:12px;color:#444;margin-bottom:16px}

/* Filter bar — wraps to multiple rows */
.filter-bar{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{flex-shrink:0;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:6px 14px;border-radius:20px;border:1px solid #222;background:transparent;color:#555;cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-btn:hover{border-color:#333;color:#aaa}
.filter-btn.active{background:#22c55e;border-color:#22c55e;color:#000}

/* Stage heading in match list */
.stage-header{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#22c55e;padding:18px 0 10px;margin-top:4px;border-bottom:1px solid #1a1a1a;margin-bottom:10px}
.stage-header:first-child{margin-top:0;padding-top:0}
.day-header{font-size:11px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.07em;padding:12px 0 8px}

/* Match cards */
.match-card{background:#151515;border:1px solid #1e1e1e;border-radius:12px;padding:13px 15px;margin-bottom:7px;display:flex;align-items:center;gap:10px;transition:border-color .15s}
.match-card:hover{border-color:#2a2a2a}
.match-card.live-card{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.04)}
.match-card.finished-card{opacity:.85}
.match-team{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
.match-team.away{justify-content:flex-end;text-align:right}

/* Crest */
.crest-wrap{flex-shrink:0;width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:#1e1e1e;border-radius:6px;overflow:hidden}
.crest-wrap img{width:30px;height:30px;object-fit:contain;display:block}
.crest-tla{font-size:8px;font-weight:700;color:#333}

.team-txt{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-txt.winner{color:#f0f0f0;font-weight:700}
.team-txt.loser{color:#444}
.team-tbd{font-size:12px;color:#333;font-style:italic}

/* Score center */
.match-center{flex-shrink:0;text-align:center;min-width:86px}
.score-nums{font-size:22px;font-weight:900;display:flex;align-items:center;justify-content:center;gap:7px;letter-spacing:-.02em}
.score-sep{color:#333;font-weight:300;font-size:18px}
.score-vs{font-size:12px;color:#333}
.match-status{font-size:10px;font-weight:700;margin-top:3px}
.st-ft{color:#444}
.st-live{color:#22c55e}
.st-ht{color:#f59e0b}
.st-soon{color:#e0e0e0}
.match-meta{font-size:10px;color:#555;margin-top:2px}
.live-dot{display:inline-block;width:6px;height:6px;background:#22c55e;border-radius:50%;margin-right:3px;animation:pulse 1.4s ease-in-out infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* Collapsible earlier-results bar */
.collapse-bar{background:#151515;border:1px solid #1e1e1e;border-radius:10px;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:12px;color:#555;margin-bottom:7px;transition:border-color .15s,color .15s;user-select:none}
.collapse-bar:hover{border-color:#2a2a2a;color:#aaa}
.collapse-count{font-weight:700;color:#888}
.collapse-chevron{font-size:18px;color:#444;transition:transform .2s;display:inline-block;line-height:1}
.collapse-chevron.open{transform:rotate(180deg)}

/* Skel */
.skel{background:linear-gradient(90deg,#181818 25%,#222 50%,#181818 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.error-msg{background:#151515;border:1px solid #1e1e1e;border-radius:10px;padding:24px;text-align:center;color:#444;font-size:13px}
.refresh-note{font-size:10px;color:#2a2a2a;text-align:right;margin-top:14px}
</style>
</head>
<body>
<header>
    <div class="logo">⚽ World Cup <em>2026</em> <span class="logo-ver">v1.0</span></div>
    <nav>
        <a href="wc-dashboard.html">Today</a>
        <a href="wc-groups.html">Groups</a>
        <a href="wc-schedule.html" class="active">Schedule</a>
    </nav>
</header>

<main>
    <div class="page-title">Full Schedule</div>

    <div class="filter-bar" id="filter-bar">
        <div class="skel" style="height:32px;width:60px;border-radius:20px;flex-shrink:0"></div>
        <div class="skel" style="height:32px;width:100px;border-radius:20px;flex-shrink:0"></div>
        <div class="skel" style="height:32px;width:90px;border-radius:20px;flex-shrink:0"></div>
    </div>

    <div id="match-count" class="match-count"></div>
    <div id="matches-list">
        <div class="match-card"><div class="skel" style="height:54px;width:100%"></div></div>
        <div class="match-card"><div class="skel" style="height:54px;width:100%"></div></div>
        <div class="match-card"><div class="skel" style="height:54px;width:100%"></div></div>
    </div>
    <div class="refresh-note" id="refresh-note"></div>
</main>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const STAGE_ORDER = ['GROUP_STAGE','LAST_32','LAST_16','QUARTER_FINALS','SEMI_FINALS','THIRD_PLACE','FINAL'];
const STAGE_LABEL = {
    GROUP_STAGE:'Group Stage', LAST_32:'Round of 32', LAST_16:'Round of 16',
    QUARTER_FINALS:'Quarterfinals', SEMI_FINALS:'Semifinals',
    THIRD_PLACE:'3rd Place Playoff', FINAL:'Final',
};
const LIVE_ST  = new Set(['LIVE','IN_PLAY','PAUSED']);
const DONE_ST  = new Set(['FINISHED','AWARDED']);

// ── Venue lookup ─────────────────────────────────────────────────────────────
const VENUE = {
    537327:'Mexico City',    537328:'Guadalajara',   537333:'Toronto',
    537345:'Dallas',         537334:'Houston',       537339:'Kansas City',
    537340:'Atlanta',        537346:'Los Angeles',   537351:'Seattle',
    537357:'Dallas',         537352:'Miami',         537358:'Kansas City',
    537369:'Philadelphia',   537363:'Boston',        537370:'Monterrey',
    537364:'Houston',        537391:'New York',      537392:'Vancouver',
    537397:'Dallas',         537398:'Guadalajara',   537403:'Los Angeles',
    537409:'Miami',          537410:'Monterrey',     537404:'Seattle',
    537329:'Houston',        537335:'Vancouver',     537336:'Kansas City',
    537330:'Guadalajara',    537348:'Los Angeles',   537342:'Boston',
    537341:'Atlanta',        537347:'New York',      537359:'Philadelphia',
    537353:'Dallas',         537354:'Seattle',       537360:'Los Angeles',
    537371:'Boston',         537365:'Kansas City',   537372:'Miami',
    537366:'Houston',        537399:'Monterrey',     537393:'New York',
    537394:'Seattle',        537400:'Los Angeles',   537405:'Boston',
    537411:'Dallas',         537412:'Philadelphia',  537406:'Guadalajara',
    537337:'Toronto',        537338:'Mexico City',   537344:'Vancouver',
    537343:'Seattle',        537331:'Miami',         537332:'Monterrey',
    537355:'Houston',        537356:'Atlanta',       537361:'Kansas City',
    537362:'New York',       537349:'Dallas',        537350:'Los Angeles',
    537395:'Philadelphia',   537396:'Boston',        537373:'Atlanta',
    537374:'Toronto',        537367:'Miami',         537368:'Guadalajara',
    537413:'Vancouver',      537414:'Houston',       537407:'New York',
    537408:'Mexico City',    537401:'Monterrey',     537402:'Seattle',
    537417:'Dallas',         537423:'New York',      537415:'Los Angeles',
    537418:'Philadelphia',   537424:'Atlanta',       537416:'Kansas City',
    537425:'Seattle',        537426:'Miami',         537422:'Boston',
    537421:'Guadalajara',    537420:'Dallas',        537419:'Houston',
    537429:'Los Angeles',    537428:'New York',      537427:'Atlanta',
    537430:'Dallas',
    537376:'Kansas City',    537375:'Los Angeles',   537377:'New York',
    537378:'Dallas',         537379:'Philadelphia',  537380:'Los Angeles',
    537381:'Atlanta',        537382:'Boston',
    537383:'New York',       537384:'Los Angeles',   537385:'Dallas',       537386:'Atlanta',
    537387:'Dallas',         537388:'New York',
    537389:'Miami',          537390:'New York',
};

// ── Cache ─────────────────────────────────────────────────────────────────────
function cacheGet(k){try{const r=JSON.parse(localStorage.getItem(k)||'null');return r&&Date.now()-r.ts<r.ttl?r.data:null}catch{return null}}
function cacheSet(k,d,ttl){try{localStorage.setItem(k,JSON.stringify({data:d,ts:Date.now(),ttl}))}catch{}}

async function loadJson(file,key,ttl=120000){
    const c=cacheGet(key);if(c)return c;
    const r=await fetch(`data/${file}?_=${Date.now()}`);
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();cacheSet(key,d,ttl);return d;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function localDay(utc){const d=new Date(utc);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fmtDay(utc){return new Date(utc).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
function fmtTime(utc){return new Date(utc).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}

// Guard against API lag: treat LIVE matches started >130 min ago as FINISHED
function effectiveStatus(m){
    if(m.status==='LIVE'||m.status==='IN_PLAY'){
        if((Date.now()-new Date(m.utcDate))/60000>130)return'FINISHED';
    }
    return m.status;
}

function matchSt(m){
    const s=m.score?.fullTime;
    const eff=effectiveStatus(m);
    if(DONE_ST.has(eff))  return{h:s?.home??'-',a:s?.away??'-',label:'FT',cls:'st-ft',live:false};
    if(eff==='LIVE')      return{h:s?.home??0, a:s?.away??0, label:'<span class="live-dot"></span>LIVE',cls:'st-live',live:true};
    if(eff==='PAUSED')    return{h:s?.home??0, a:s?.away??0, label:'HT',cls:'st-ht',live:true};
    return{h:null,a:null,label:fmtTime(m.utcDate),cls:'st-soon',live:false};
}
function winCls(m,side){
    if(!DONE_ST.has(effectiveStatus(m)))return'';
    const w=m.score?.winner;if(!w||w==='DRAW')return'';
    return((side==='home'&&w==='HOME_TEAM')||(side==='away'&&w==='AWAY_TEAM'))?'winner':'loser';
}

function crest(team,sz=30){
    // team.name is null for undetermined knockout slots
    if(!team?.name)return`<div class="crest-wrap" style="width:${sz}px;height:${sz}px"><span class="crest-tla">?</span></div>`;
    if(!team.crest)return`<div class="crest-wrap" style="width:${sz}px;height:${sz}px"><span class="crest-tla">${team.tla||'?'}</span></div>`;
    return`<div class="crest-wrap" style="width:${sz}px;height:${sz}px"><img src="${team.crest}" width="${sz}" height="${sz}" alt="${team.tla||''}" onerror="this.style.display='none'"></div>`;
}

function matchCard(m){
    const{h,a,label,cls,live}=matchSt(m);
    const ht=m.homeTeam,at=m.awayTeam;
    // API returns {name:null,...} for undetermined knockout slots — check .name not just the object
    const htTxt=ht?.name?`<span class="team-txt ${winCls(m,'home')}">${ht.shortName||ht.name}</span>`:`<span class="team-tbd">TBD</span>`;
    const atTxt=at?.name?`<span class="team-txt ${winCls(m,'away')}">${at.shortName||at.name}</span>`:`<span class="team-tbd">TBD</span>`;
    const scoreHtml=h!==null?`<span>${h}</span><span class="score-sep">–</span><span>${a}</span>`:`<span class="score-vs">vs</span>`;
    const grpTxt=m.group?` · Grp ${m.group.replace('GROUP_','')}${m.matchday?` MD${m.matchday}`:''}`:m.matchday?` · MD${m.matchday}`:'';
    const cityTxt=VENUE[m.id]?` · ${VENUE[m.id]}`:'';
    return`<div class="match-card ${live?'live-card':''} ${DONE_ST.has(m.status)?'finished-card':''}">
        <div class="match-team">${crest(ht,30)}${htTxt}</div>
        <div class="match-center">
            <div class="score-nums">${scoreHtml}</div>
            <div class="match-status ${cls}">${label}</div>
            <div class="match-meta">${fmtTime(m.utcDate)}${grpTxt}${cityTxt}</div>
        </div>
        <div class="match-team away">${atTxt}${crest(at,30)}</div>
    </div>`;
}

// ── Phase detection ───────────────────────────────────────────────────────────
function detectPhase(matches){
    const started=new Set(matches.filter(m=>DONE_ST.has(m.status)||LIVE_ST.has(m.status)).map(m=>m.stage));
    for(const s of [...STAGE_ORDER].reverse())if(started.has(s))return s;
    for(const s of STAGE_ORDER)if(matches.some(m=>m.stage===s))return s;
    return'GROUP_STAGE';
}

// ── Render ────────────────────────────────────────────────────────────────────
let allMatches=[], activeFilter='GROUP_STAGE', finishedExpanded=false;

function toggleFinished(){
    finishedExpanded=!finishedExpanded;
    const sec=document.getElementById('finished-section');
    const chev=document.getElementById('finished-chevron');
    if(sec)sec.style.display=finishedExpanded?'':'none';
    if(chev)chev.className='collapse-chevron'+(finishedExpanded?' open':'');
}

function renderFilterBar(){
    const stages=[...new Set(allMatches.map(m=>m.stage))]
        .sort((a,b)=>STAGE_ORDER.indexOf(a)-STAGE_ORDER.indexOf(b));
    const btns=[{k:'ALL',l:'All'},...stages.map(s=>({k:s,l:STAGE_LABEL[s]||s}))];
    document.getElementById('filter-bar').innerHTML=btns.map(({k,l})=>
        `<button class="filter-btn ${k===activeFilter?'active':''}" onclick="setFilter('${k}')">${l}</button>`
    ).join('');
}

function groupByDay(ms){
    const map=new Map();
    for(const m of ms){const d=localDay(m.utcDate);if(!map.has(d))map.set(d,[]);map.get(d).push(m);}
    return[...map.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
}

function renderDayGroup(ms){
    return`<div class="day-header">${fmtDay(ms[0].utcDate)}</div>`+
        ms.sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate)).map(matchCard).join('');
}

function renderStageGroups(matches){
    let html='';
    if(activeFilter==='ALL'){
        const gsMs=matches.filter(m=>m.stage==='GROUP_STAGE');
        const koMs=matches.filter(m=>m.stage!=='GROUP_STAGE');
        if(gsMs.length){
            html+=`<div class="stage-header">Group Stage</div>`;
            for(const[,ms] of groupByDay(gsMs)) html+=renderDayGroup(ms);
        }
        const koByStage=new Map();
        for(const m of koMs){if(!koByStage.has(m.stage))koByStage.set(m.stage,[]);koByStage.get(m.stage).push(m);}
        for(const stage of STAGE_ORDER.filter(s=>koByStage.has(s))){
            html+=`<div class="stage-header">${STAGE_LABEL[stage]||stage}</div>`;
            for(const[,ms] of groupByDay(koByStage.get(stage))) html+=renderDayGroup(ms);
        }
    } else {
        for(const[,ms] of groupByDay(matches)) html+=renderDayGroup(ms);
    }
    return html;
}

function renderMatches(){
    const filtered=activeFilter==='ALL'?allMatches:allMatches.filter(m=>m.stage===activeFilter);
    document.getElementById('match-count').textContent=`${filtered.length} matches`;

    const done=filtered.filter(m=>DONE_ST.has(effectiveStatus(m)));
    const active=filtered.filter(m=>!DONE_ST.has(effectiveStatus(m)));

    let html='';
    if(active.length) html+=renderStageGroups(active);

    if(done.length){
        const exp=finishedExpanded||(active.length===0);
        html+=`<div class="collapse-bar" onclick="toggleFinished()">
            <span><span class="collapse-count">${done.length}</span> earlier result${done.length!==1?'s':''}</span>
            <span class="collapse-chevron${exp?' open':''}" id="finished-chevron">▾</span>
        </div>
        <div id="finished-section" style="display:${exp?'':'none'}">
            ${renderStageGroups(done)}
        </div>`;
    }

    document.getElementById('matches-list').innerHTML=html||'<div class="error-msg">No matches found.</div>';
}

function setFilter(f){
    activeFilter=f;
    finishedExpanded=false;
    renderFilterBar();
    renderMatches();
}

async function init(){
    try{
        const data=await loadJson('matches.json','wc_matches',120000);
        allMatches=(data.matches||[]).sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));
        // Default to the current phase
        activeFilter=detectPhase(allMatches);
        renderFilterBar();
        renderMatches();
        const upd=data._meta?.updated;
        document.getElementById('refresh-note').textContent=upd
            ?`Data updated ${new Date(upd).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`
            :`Updated ${new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
    }catch(e){
        document.getElementById('matches-list').innerHTML=`<div class="error-msg">Error loading schedule: ${e.message}</div>`;
    }
}
init();
</script>
</body>
</html>
