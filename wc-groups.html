<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Groups · 2026 World Cup</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0b0b;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}

header{border-bottom:1px solid #1e1e1e;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#0b0b0b;z-index:100}
.logo{font-size:14px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.logo em{color:#22c55e;font-style:normal}
.logo-ver{font-size:10px;font-weight:400;color:#333}
nav a{font-size:11px;font-weight:600;color:#444;margin-left:22px;text-transform:uppercase;letter-spacing:.08em;transition:color .15s}
nav a:hover{color:#f0f0f0}
nav a.active{color:#22c55e}

main{max-width:1100px;margin:0 auto;padding:24px 16px 60px}
.page-title{font-size:22px;font-weight:800;margin-bottom:4px}
.page-sub{font-size:12px;color:#555;margin-bottom:20px}

/* Legend */
.key{display:flex;align-items:center;gap:18px;margin-bottom:20px;flex-wrap:wrap}
.key-item{display:flex;align-items:center;gap:7px;font-size:11px;color:#666}
.key-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.key-dot.q-auto{background:#22c55e}
.key-dot.q-pos{background:#f59e0b}
.key-dot.q-out{background:#2a2a2a;border:1px solid #333}

/* Groups grid */
.groups-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:900px){.groups-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){.groups-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:380px){.groups-grid{grid-template-columns:1fr}}

/* Group card */
.group-card{background:#151515;border:1px solid #1e1e1e;border-radius:12px;overflow:hidden}
.group-header{padding:10px 14px 8px;border-bottom:1px solid #1c1c1c;display:flex;align-items:center;justify-content:space-between}
.group-title{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#555}
.group-played{font-size:10px;color:#333}

table.gt{width:100%;border-collapse:collapse}
table.gt thead th{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#333;padding:5px 5px;text-align:center}
table.gt thead th.th-team{text-align:left;padding-left:6px}
table.gt tbody tr{border-top:1px solid #1a1a1a;transition:background .1s}
table.gt tbody tr:hover{background:rgba(255,255,255,.02)}
table.gt tbody td{padding:7px 5px;font-size:12px;text-align:center;color:#999}

/* Team cell */
.team-cell{display:flex;align-items:center;gap:6px;padding:0 0 0 2px}
.pos-bar{width:3px;height:30px;border-radius:2px;flex-shrink:0}
.row-q1 .pos-bar,.row-q2 .pos-bar{background:#22c55e}
.row-q3 .pos-bar{background:#f59e0b}
.row-q4 .pos-bar{background:#1e1e1e}

.pos-num{font-size:9px;font-weight:700;color:#333;width:10px;flex-shrink:0;text-align:center}

/* Crest */
.crest-box{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#1e1e1e;border-radius:4px;overflow:hidden}
.crest-box img{width:22px;height:22px;object-fit:contain;display:block}
.crest-box .ctla{font-size:7px;font-weight:700;color:#444;letter-spacing:.03em}

.t-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px}
.row-q1 .t-name,.row-q2 .t-name{color:#f0f0f0}
.row-q3 .t-name{color:#ccc}
.row-q4 .t-name{color:#555}

.td-pts{font-weight:800;font-size:13px}
.row-q1 .td-pts,.row-q2 .td-pts{color:#22c55e}
.row-q3 .td-pts{color:#f59e0b}
.row-q4 .td-pts{color:#333}

.gd-pos{color:#22c55e}
.gd-neg{color:#ef4444}

/* Skel */
.skel{background:linear-gradient(90deg,#181818 25%,#222 50%,#181818 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.error-msg{background:#151515;border:1px solid #1e1e1e;border-radius:10px;padding:28px;text-align:center;color:#444;font-size:13px;grid-column:1/-1}
.refresh-note{font-size:10px;color:#2a2a2a;text-align:right;margin-top:16px}

/* Option A — post-group-stage banner */
.ko-banner{display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.22);border-radius:10px;padding:13px 16px;margin-bottom:20px;text-decoration:none;transition:background .15s;cursor:pointer}
.ko-banner:hover{background:rgba(34,197,94,.13)}
.ko-banner-tag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#22c55e;margin-bottom:3px}
.ko-banner-msg{font-size:13px;font-weight:600;color:#f0f0f0}
.ko-banner-arr{font-size:18px;color:#22c55e;flex-shrink:0}
/* Option D — nav pulse on Bracket link when KO is underway */
@keyframes bk-pulse{0%,100%{color:#22c55e}50%{color:#4ade80;text-shadow:0 0 8px rgba(34,197,94,.5)}}
nav a.bk-live{animation:bk-pulse 2s ease-in-out infinite}

@media(max-width:600px){
    header{padding:0 16px}
    .logo-wordmark,.logo-ver{display:none}
    nav a{margin-left:14px;font-size:10px}
}
</style>
</head>
<body>
<header>
    <div class="logo">⚽ <span class="logo-wordmark">World Cup </span><em>2026</em> <span class="logo-ver">v1.9</span></div>
    <nav>
        <a href="wc-dashboard.html">Today</a>
        <a href="wc-groups.html" class="active">Groups</a>
        <a href="wc-bracket.html">Bracket</a>
        <a href="wc-schedule.html">Schedule</a>
    </nav>
</header>

<main>
    <div class="page-title">Group Standings</div>
    <div class="page-sub">Top 2 from each group advance automatically · Best 8 third-place teams also advance</div>

    <div id="ko-banner-wrap"></div>
    <div class="key">
        <div class="key-item"><div class="key-dot q-auto"></div>Advances (automatic)</div>
        <div class="key-item"><div class="key-dot q-pos"></div>Possible 3rd-place qualifier</div>
        <div class="key-item"><div class="key-dot q-out"></div>Eliminated</div>
    </div>

    <div id="groups-grid" class="groups-grid">
        ${Array(12).fill(0).map(()=>`<div class="group-card"><div style="padding:12px"><div class="skel" style="height:140px"></div></div></div>`).join('')}
    </div>
    <div class="refresh-note" id="refresh-note"></div>
</main>

<script>
function cacheGet(k){try{const r=JSON.parse(localStorage.getItem(k)||'null');return r&&Date.now()-r.ts<r.ttl?r.data:null}catch{return null}}
function cacheSet(k,d,ttl){try{localStorage.setItem(k,JSON.stringify({data:d,ts:Date.now(),ttl}))}catch{}}

async function loadJson(file,key,ttl=120000){
    const c=cacheGet(key);if(c)return c;
    const r=await fetch(`data/${file}?_=${Date.now()}`);
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();cacheSet(key,d,ttl);return d;
}

function gdStr(n){return n>0?`+${n}`:String(n)}
function gdCls(n){return n>0?'gd-pos':n<0?'gd-neg':''}
function rowCls(i){return i===0?'row-q1':i===1?'row-q2':i===2?'row-q3':'row-q4'}

function crestCell(team){
    if(team?.crest){
        return`<div class="crest-box"><img src="${team.crest}" alt="${team.tla||''}" onerror="this.parentElement.innerHTML='<span class=ctla>${team.tla||''}</span>'"></div>`;
    }
    return`<div class="crest-box"><span class="ctla">${team?.tla||'?'}</span></div>`;
}

function groupCardHtml(g){
    // g.group is "Group A" format from standings API
    const letter=g.group.replace('Group ','');
    const played=g.table.reduce((s,r)=>s+r.playedGames,0);

    const rows=g.table.map((row,i)=>`
    <tr class="${rowCls(i)}">
        <td class="td-team" style="padding-left:0">
            <div class="team-cell">
                <div class="pos-bar"></div>
                <span class="pos-num">${row.position}</span>
                ${crestCell(row.team)}
                <span class="t-name" title="${row.team.name}">${row.team.tla||row.team.shortName}</span>
            </div>
        </td>
        <td>${row.playedGames}</td>
        <td>${row.won}</td>
        <td>${row.draw}</td>
        <td>${row.lost}</td>
        <td class="${gdCls(row.goalDifference)}">${gdStr(row.goalDifference)}</td>
        <td class="td-pts">${row.points}</td>
    </tr>`).join('');

    return`<div class="group-card" id="group-${letter.toLowerCase()}">
        <div class="group-header">
            <span class="group-title">Group ${letter}</span>
            <span class="group-played">${played} played</span>
        </div>
        <table class="gt">
            <thead><tr>
                <th class="th-team">Team</th>
                <th title="Played">P</th><th title="Won">W</th>
                <th title="Drawn">D</th><th title="Lost">L</th>
                <th title="Goal difference">GD</th>
                <th title="Points" style="color:#22c55e">Pts</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table>
    </div>`;
}

function applyNavPulse(){
    document.querySelectorAll('nav a[href="wc-bracket.html"]').forEach(a=>a.classList.add('bk-live'));
}

async function init(){
    try{
        const data=await loadJson('standings.json','wc_standings',120000);
        // API returns stage:'ALL', type:'TOTAL' — one entry per group
        const groups=(data.standings||[])
            .filter(s=>s.type==='TOTAL')
            .sort((a,b)=>a.group.localeCompare(b.group));

        if(!groups.length){
            document.getElementById('groups-grid').innerHTML=
                '<div class="error-msg">Group stage standings not yet available.</div>';
            return;
        }
        document.getElementById('groups-grid').innerHTML=groups.map(groupCardHtml).join('');
        const upd=data._meta?.updated;
        document.getElementById('refresh-note').textContent=upd
            ?`Data updated ${new Date(upd).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`
            :`Updated ${new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;

        // Option A — banner + Option D — nav pulse when group stage is done
        const complete=groups.length>0&&groups.every(g=>g.table.every(r=>r.playedGames>=3));
        if(complete){
            try{localStorage.setItem('ko_started','1');}catch{}
            document.getElementById('ko-banner-wrap').innerHTML=
                `<a href="wc-bracket.html" class="ko-banner">
                    <div><div class="ko-banner-tag">Group stage complete</div>
                    <div class="ko-banner-msg">The knockout bracket is underway</div></div>
                    <span class="ko-banner-arr">→</span>
                </a>`;
            applyNavPulse();
        }
    }catch(e){
        document.getElementById('groups-grid').innerHTML=
            `<div class="error-msg">Error loading standings: ${e.message}</div>`;
    }
}
// Apply nav pulse immediately if already known from a previous visit
if(localStorage.getItem('ko_started')==='1')applyNavPulse();
init();
</script>
</body>
</html>
